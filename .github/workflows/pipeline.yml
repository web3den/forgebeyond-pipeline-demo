name: pipeline

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Import app
        run: python - <<'PY'
          from app.main import title_from_html
          assert title_from_html("<title>ok</title>") == "ok"
          PY

